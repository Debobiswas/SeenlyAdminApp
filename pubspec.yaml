name: seenly_admin_app
description: Seenly admin Flutter application for account moderation workflows.
publish_to: none
version: 0.1.24+25

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  flutter_dotenv: ^5.2.1
  supabase_flutter: ^2.8.4
  intl: ^0.20.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - .env

dependency_overrides:
  device_info_plus: 11.2.1
