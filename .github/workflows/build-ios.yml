name: Build iOS IPA

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest # Required for latest Xcode / iOS builds
    
    steps:
      # 1. Checkout repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1.5 Select Xcode Version (Needed for new iOS/visionOS APIs in Flutter plugins)
      - name: Setup Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      # 2. Setup Java Environment (needed if any android-linked tasks run, or for generic setup)
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Setup Flutter Environment
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # You can specify a exact Flutter version here if needed, e.g.:
          # flutter-version: '3.19.0'
          cache: true

      # 4. Install Dependencies
      - name: Install dependencies
        run: |
          flutter clean
          flutter pub get

      # 4.5 Create .env file
      # Since .env is usually gitignored, Flutter will fail if it's missing during the build.
      # You can populate this with actual secrets later by using: echo "KEY_NAME=${{ secrets.MY_SECRET }}" >> .env
      - name: Create .env file
        run: touch .env

      # 5. Set up iOS Code Signing (Only executed if secrets are present)
      # In GitHub repository settings, you'd add:
      # - APP_STORE_CONNECT_API_KEY (or P12 certificate and provisioning profile)
      - name: Install Apple Certificate and Provisioning Profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$BUILD_CERTIFICATE_BASE64" ]; then
            echo "No signing certificate found. Proceeding with UNSIGNED build config."
            exit 0
          fi
          
          # Create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Import certificate and provisioning profile from secrets
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          
          # Import certificate to keychain
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          
          # Prevent codesign popup prompt
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Apply provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      # 6. Build IPA
      # If certificates are installed, build a signed IPA.
      # If not, build an unsigned IPA (useful for testing compilation on CI).
      - name: Build Flutter IPA
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
        run: |
          if [ -n "$BUILD_CERTIFICATE_BASE64" ]; then
            echo "Building SIGNED IPA..."
            # For signed builds, specify export options or rely on Xcode auto-signing if configured
            flutter build ipa --release --export-options-plist=ios/ExportOptions.plist
          else
            echo "Building UNSIGNED IPA for verification..."
            flutter build ipa --release --no-codesign
          fi

      # 7. Upload Build Artifact
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          # The IPA will be generated in build/ios/ipa/
          path: build/ios/ipa/*.ipa
          if-no-files-found: warn
